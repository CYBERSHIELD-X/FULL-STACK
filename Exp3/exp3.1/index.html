<!DOCTYPE html>
<html>
<head>
  <title>Experiment 3.1 - Product Card</title>

  <style>
    .card {
      width: 250px;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .in {
      color: green;
      font-weight: bold;
    }
    .out {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Product Card Experiment</h2>

  <div id="app"></div>

  <script>
    function ProductCard(name, price, inStock) {
      return `
        <div class="card">
          <h3>${name}</h3>
          <p>₹${price.toFixed(2)}</p>
          <p class="${inStock ? 'in' : 'out'}">
            ${inStock ? 'In Stock' : 'Out of Stock'}
          </p>
        </div>
      `;
    }

    document.getElementById("app").innerHTML =
      ProductCard("Wireless Mouse", 799, true);
  </script>

</body>
</html>
