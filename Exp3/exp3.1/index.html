<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Cards</title>
  <link rel="stylesheet" href="./ProductCard.css">
</head>

<body>

  <!-- Product Cards Container -->
  <div class="product-container">

    <!-- Product Card 1 -->
    <div class="product-card">
      <div class="product-image"></div>
      <h3 class="product-name">Wireless Headphones</h3>
      <p class="product-price">$129.99</p>
      <span class="status in-stock">In Stock</span>
    </div>

    <!-- Product Card 2 -->
    <div class="product-card">
      <div class="product-image"></div>
      <h3 class="product-name">Mechanical Keyboard</h3>
      <p class="product-price">$89.99</p>
      <span class="status out-stock">Out of Stock</span>
    </div>

    <!-- Product Card 3 -->
    <div class="product-card">
      <div class="product-image"></div>
      <h3 class="product-name">Smart Watch</h3>
      <p class="product-price">$199.99</p>
      <span class="status in-stock">In Stock</span>
    </div>

  </div>

</body>
</html>
